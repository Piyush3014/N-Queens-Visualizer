<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N-Queen Visualiser</title>
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Main card container -->
    <div class="card">
      <!-- Header with gradient and glow -->
      <header class="header">
        <h2>
          N-Queens Visualiser 
          <i class="fas fa-crown" style="color: #fdfffc; font-size: 1.2rem;"></i>
          <span>visualizer</span>
        </h2>
      </header>

      <!-- Input row with glass effect -->
      <div class="input-row">
        <div class="inputbox">
          <input type="number" class="numberbox" id="numberbox" min="4" max="8" value="4" required />
          <label for="numberbox">Enter total Queens</label>
        </div>

        <div class="slider-container">
          <input
            class="slider"
            id="slider"
            type="range"
            min="1"
            max="10"
            value="5"
          />
          <div id="progress-bar"></div>
        </div>

        <button class="play-button" id="play-button">
          <i class="fa fa-play" aria-hidden="true"></i> Play
        </button>
      </div>

      <!-- Status message -->
      <div style="display: flex; justify-content: center;">
        <div class="queen-arrangement" id="queen-arrangement">
          ♛ 4‑Queens · 2 solutions
        </div>
      </div>

      <!-- Board container -->
      <div id="n-queen-board"></div>

      <!-- Footer note -->
      <div class="footer-note">✦ gentle gradients · responsive · animated ✦</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
